<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const imageData = ctx.createImageData(canvas.width, canvas.height);
const pixels = imageData.data; // Array of color [R,G,B,A, R,G,B,A, ...]
function putPixel(x,y,r,g,b,a=255)
{
    const idx =(y*canvas.width+x)*4;
    pixels[idx] = r;
    pixels[idx+1]=g;
    pixels[idx+2]=b;
    pixels[idx+3]=a;
}
function drawLine(x1,y1,x2,y2,r,g,b,a=255)
{
    const dx=Math.abs(x2-x1);
    const dy=Math.abs(y2-y1);
    if(dx>dy){
      const m=(y2-y1)/(x2-x1);
      let c=y1-m*x1;
      for(let x=Math.min(x1,x2);x<=Math.max(x1,x2);x++){
        const y=Math.round(m*x+c);
        putPixel(x,y,r,g,b,a);
      } 
    }else{
        const m=(x2-x1)/(y2-y1);
        let c=x1-m*y1;
        for(let y=Math.min(y1,y2);y<=Math.max(y1,y2);y++){
           const x=Math.round(m*y+c);
           putPixel(x,y,r,g,b,a);
       } 
    }
}
let r2=0;
function drawEllipse(cx, cy, r1, r, g, b, a = 255) {
      for (let y = -r1; y <= r1; y++) {
        for (let x = -r1; x <= r1; x++) {
          if ((x * x) + (y * y) <= (r1 * r1)) {
            putPixel(cx + x, cy + y, r, g, b, a);
          }
        }
      }
    }
function drawarr(arr,degree,x,y,n,r,g,b,a){
  for(let j=0;j<arr.length;j++){
    for(let i=0;i<arr[j].length;i++){
       //rotatioe
        const cy = j - (arr.length / 2);
        const cx = i - (arr[j].length / 2);

        const rad = degree * Math.PI / 180;
        const rotatioe_x =Math.round((cx*Math.cos(rad))-(cy*Math.sin(rad)));
        const rotatioe_y =Math.round((cx*Math.sin(rad))+(cy*Math.cos(rad)));

        const Scaled_rotatioe_x =Math.round(rotatioe_x*n);
        const Scaled_rotatioe_y =Math.round(rotatioe_y*n);
       const color = arr[j][i];

       if (color !== null) {
          const r = (color >> 16) & 255;
          const g = (color >> 8) & 255;
          const b = color & 255;
          drawEllipse(x+Scaled_rotatioe_x,y+Scaled_rotatioe_y,r2,r,g,b,a);
      }
    }
  }
}
function drawRectFilled(x1, y1, x2, y2, r, g, b, a = 255) {
    for (let y = y1; y <= y2; y++) {
      for (let x = x1; x <= x2; x++) {
          putPixel(x, y, r, g, b, a);
      }
     }
    }

let degree=0;
let n=1;
let mouseX = 0, mouseY = 0;
function toScaledMousePos(posX, posY) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: Math.floor((posX - rect.left) * scaleX),
    y: Math.floor((posY - rect.top) * scaleY)
  };
}
window.addEventListener('keydown',(event)=>{
   if(event.key=='ArrowLeft'){
     O=-1;
   }else if(event.key=='ArrowRight'){
     O=1;
   }
   if(event.key=='['){
     n--;r2--;
   }else if(event.key==']'){
     n++;r2++;
   }
})
window.addEventListener('keyup',(event)=>{
   if(event.key=='ArrowLeft'){
     O=0;
   }else if(event.key=='ArrowRight'){
     O=0;
   }
})
canvas.addEventListener('mousemove',(event)=>{
  const { x, y } = toScaledMousePos(event.clientX, event.clientY);
  mouseX=x;
  mouseY=y;
})

function animate(){
  drawRectFilled(0, 0, canvas.width - 1, canvas.height - 1, 255, 255, 255); // Clear the canvas with black
  degree += O;
  drawarr(smileSprite24Bit,degree,100,100,n);
  drawarr(goldenAppleSprite24Bit,degree,mouseX,mouseY,n);
  ctx.putImageData(imageData, 0, 0);
  requestAnimationFrame(animate);
}
animate()
ctx.putImageData(imageData, 0, 0);
